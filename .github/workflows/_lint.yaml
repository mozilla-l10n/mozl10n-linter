name: Lint (reusable)
on:
  workflow_call:
    inputs:
      repository:
        type: string
        required: true
      repository_ref:
        type: string
        required: false
        default: ''
      target_sparse:
        type: string
        required: false
        default: ''
      script:
        type: string
        required: true
      script_args:
        type: string
        required: true
      script_args_2:
        type: string
        required: false
        default: ''
jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      cache_key: ${{ steps.compute.outputs.cache_key }}
      cache_hit: ${{ steps.lookup.outputs.cache-hit }}
    steps:
      - name: Clone repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Compute cache key
        id: compute
        env:
          REPO: ${{ inputs.repository }}
          REF: ${{ inputs.repository_ref }}
          SCRIPT: ${{ inputs.script }}
          ARGS: ${{ inputs.script_args }}
          ARGS2: ${{ inputs.script_args_2 }}
        run: |
          ref="${REF:-HEAD}"
          target_sha=$(git ls-remote "https://github.com/${REPO}" "$ref" | awk '{print $1}' | head -n1)
          if [ -z "$target_sha" ]; then
            echo "Could not resolve target SHA; will run lint"
            exit 0
          fi
          exception_files=$(
            printf '%s\n%s\n' "$ARGS" "$ARGS2" \
              | tr ' \t' '\n\n' \
              | grep -E '^scripts_repo/l10n/exceptions/.+\.json$' \
              | sed 's|^scripts_repo/||' \
              | sort -u
          )
          inputs_hash=$(
            {
              sha256sum .github/workflows/_lint.yaml
              sha256sum .github/requirements.txt
              sha256sum "l10n/${SCRIPT}"
              if [ -n "$exception_files" ]; then
                echo "$exception_files" | xargs -n1 sha256sum
              fi
            } | sha256sum | awk '{print $1}'
          )
          repo_slug=$(echo "$REPO" | tr '/' '_')
          key="lint-${repo_slug}-${target_sha:0:12}-${inputs_hash:0:12}"
          echo "cache_key=$key" >> "$GITHUB_OUTPUT"
          echo "Cache key: $key"
      - name: Look up cache
        id: lookup
        if: steps.compute.outputs.cache_key != ''
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: ${{ steps.compute.outputs.cache_key }}
          path: .lint-marker
          lookup-only: true
      - name: Report skip
        if: steps.lookup.outputs.cache-hit == 'true'
        run: |
          {
            echo "### Skipped: target unchanged since last successful lint"
            echo "Cache key: \`${{ steps.compute.outputs.cache_key }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
  lint:
    needs: preflight
    if: needs.preflight.outputs.cache_hit != 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          path: scripts_repo
      - name: Clone target repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.repository_ref }}
          path: target_repo
          sparse-checkout: ${{ inputs.target_sparse }}
      - name: Set up Python 3
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
      - name: Install Python dependencies
        run: pip install -r scripts_repo/.github/requirements.txt
      - name: Lint localization
        run: python scripts_repo/l10n/${{ inputs.script }} ${{ inputs.script_args }}
      - name: Lint localization (2)
        if: inputs.script_args_2 != ''
        run: python scripts_repo/l10n/${{ inputs.script }} ${{ inputs.script_args_2 }}
      - name: Prepare cache marker
        id: marker
        if: needs.preflight.outputs.cache_key != ''
        run: |
          if compgen -G "errors*.txt" > /dev/null; then
            echo "save=false" >> "$GITHUB_OUTPUT"
          else
            mkdir -p .lint-marker
            echo "ok" > .lint-marker/ok
            echo "save=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Save cache marker
        if: steps.marker.outputs.save == 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: ${{ needs.preflight.outputs.cache_key }}
          path: .lint-marker
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: errors-list
          path: errors*.txt
          if-no-files-found: ignore
      - name: Fail on errors
        run: |
          if compgen -G "errors*.txt" > /dev/null; then
            echo "### There are errors" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat errors*.txt >> $GITHUB_STEP_SUMMARY
            echo '' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
