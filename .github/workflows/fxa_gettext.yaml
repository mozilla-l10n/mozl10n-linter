name: FxA Gettext
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fxa_gettext.yaml'
      - '.github/workflows/_lint.yaml'
      - '.github/requirements.txt'
      - 'l10n/gettext_l10n.py'
      - 'l10n/exceptions/fxa_gettext.json'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/fxa_gettext.yaml'
      - '.github/workflows/_lint.yaml'
      - '.github/requirements.txt'
      - 'l10n/gettext_l10n.py'
      - 'l10n/exceptions/fxa_gettext.json'
  schedule:
    - cron: '10 1 * * *'
    - cron: '10 9 * * *'
    - cron: '10 17 * * *'
  workflow_dispatch:
jobs:
  lint:
    uses: ./.github/workflows/_lint.yaml
    with:
      repository: mozilla/fxa-content-server-l10n
      script: gettext_l10n.py
      script_args: >-
        --l10n target_repo/locale/
        --dest errors.txt
        --exceptions scripts_repo/l10n/exceptions/fxa_gettext.json
        --no-failure
