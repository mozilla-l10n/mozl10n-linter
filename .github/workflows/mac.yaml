name: MAC
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/mac.yaml'
      - '.github/workflows/_lint.yaml'
      - '.github/requirements.txt'
      - 'l10n/webext_l10n.py'
      - 'l10n/exceptions/mac.json'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/mac.yaml'
      - '.github/workflows/_lint.yaml'
      - '.github/requirements.txt'
      - 'l10n/webext_l10n.py'
      - 'l10n/exceptions/mac.json'
  schedule:
    - cron: '5 1 * * *'
    - cron: '5 9 * * *'
    - cron: '5 17 * * *'
  workflow_dispatch:
jobs:
  lint:
    uses: ./.github/workflows/_lint.yaml
    with:
      repository: mozilla-l10n/multi-account-containers-l10n
      script: webext_l10n.py
      script_args: >-
        --l10n target_repo/
        --ref en
        --dest errors.txt
        --exceptions scripts_repo/l10n/exceptions/mac.json
        --no-failure
