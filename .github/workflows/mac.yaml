name: MAC
on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/mac.yaml'
      - '.github/requirements.txt'
      - 'l10n/webext_l10n.py'
      - 'l10n/exceptions/mac.json'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/mac.yaml'
      - '.github/requirements.txt'
      - 'l10n/webext_l10n.py'
      - 'l10n/exceptions/mac.json'
  schedule:
    - cron: '5 1 * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          path: "scripts_repo"
      - name: Clone target repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: "mozilla-l10n/multi-account-containers-l10n"
          path: "target_repo"
      - name: Set up Python 3
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
      - name: Lint localization
        run: >
          python scripts_repo/l10n/webext_l10n.py
          --l10n target_repo/
          --ref en
          --dest errors.txt
          --exceptions scripts_repo/l10n/exceptions/mac.json
          --no-failure
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: errors-list
          path: errors.txt
          if-no-files-found: ignore
      - name: Fail on errors
        run: |
          if [ -f "errors.txt" ]; then
            echo "### There are errors" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat errors.txt >> $GITHUB_STEP_SUMMARY
            echo '' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
